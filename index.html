<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulación de Seguridad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f2f2f0;
      display: flex;
      justify-content: center;
      padding: 30px;
    }
    .container {
      max-width: 500px;
      width: 100%;
    }
    .alert {
      background: #C0392B;
      color: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 15px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      cursor: pointer;
    }
    .selected {
      background: #FEF9EC;
      border-color: #F9DFA0;
    }
    .report {
      width: 100%;
      margin-top: 15px;
      background: #FDEEEC;
      border: 1px solid #F5B7B1;
      color: #C0392B;
    }
    .success {
      display: none;
      color: green;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="alert">
    <h2>⚠️ Esta fue una simulación</h2>
    <p>Escaneaste un QR no verificado</p>
  </div>

  <div class="card">
    <p><strong>¿Por qué escaneaste?</strong></p>

    <div class="btn-group">
      <button onclick="sendReason(this,'legitimo')">Me pareció legítimo</button>
      <button onclick="sendReason(this,'urgencia')">Tenía urgencia</button>
      <button onclick="sendReason(this,'curiosidad')">Me llamó la atención</button>
    </div>

    <button class="report" onclick="sendReport()">Reportar intento sospechoso</button>

    <div id="success" class="success">✔ Reporte enviado</div>
  </div>

</div>

<script>
const endpoint = "https://formspree.io/f/xkopkkje";

function getQR() {
  return new URLSearchParams(window.location.search).get("qr") || "sin_qr";
}

function getFecha() {
  return new Date().toISOString();
}

async function send(data) {
  await fetch(endpoint, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify(data)
  });
}

async function sendReason(btn, motivo) {
  document.querySelectorAll("button").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");

  await send({
    tipo: "motivo",
    motivo: motivo,
    qr: getQR(),
    fecha: getFecha()
  });
}

async function sendReport() {
  await send({
    tipo: "reporte",
    qr: getQR(),
    fecha: getFecha()
  });

  document.getElementById("success").style.display = "block";
}
</script>

</body>
</html>
